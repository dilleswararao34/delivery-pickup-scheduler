databases:
  # 1. PostgreSQL Database Instance
  - name: sd-digitals-db
    plan: free
    ipAllowList: [] # Allow connections only from services inside Render

services:
  # 2. Express Backend API Service
  - type: web
    name: sd-digitals-backend-api
    plan: free
    runtime: node
    buildCommand: npm install --workspace=backend
    startCommand: node backend/server.js
    env: block
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: sd-digitals-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sd-digitals-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sd-digitals-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sd-digitals-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sd-digitals-db
          property: password
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: MAIN_ADMIN_EMAIL
        sync: false
      - key: MAIN_ADMIN_PASSWORD
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: "SD Digitals <no-reply@sddigitals.in>"
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

  # 3. Static Site for React Frontend
  - type: web
    name: sd-digitals-frontend
    runtime: static
    buildCommand: npm install --workspace=frontend && npm run build --workspace=frontend
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

